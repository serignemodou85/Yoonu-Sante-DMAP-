<!-- DataTables -->

<script src="{% static 'patient/plugins/datatables/dataTables.bootstrap.js' %}"></script>

<!-- Initialisation des DataTables -->
<script>
  $(function () {
    $("#example1").dataTable();
    $('#example2').dataTable({
      "bPaginate": true,
      "bLengthChange": false,
      "bFilter": false,
      "bSort": true,
      "bInfo": true,
      "bAutoWidth": false
    });
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    {% if messages %}
        {% for message in messages %}
            Swal.fire({
                icon: '{{ message.tags|default:"info" }}',
                title: '{{ message.tags|default:"Message"|title }}',
                text: '{{ message|escapejs }}',
                timer: 3000,
                showConfirmButton: false
            });
        {% endfor %}
    {% endif %}
});
</script>

<script>
  function confirmLogout() {
      Swal.fire({
          title: 'Voulez-vous vraiment vous déconnecter ?',
          text: "Vous serez déconnecté de votre compte.",
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#3085d6',
          cancelButtonColor: '#d33',
          confirmButtonText: 'Oui, déconnectez-moi!',
          cancelButtonText: 'Annuler'
      }).then((result) => {
          if (result.isConfirmed) {
              // Rediriger vers la vue de déconnexion
              window.location.href = "{% url 'logout' %}";
          }
      });
  }
</script>
