{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réinitialisation du mot de passe | DMAP</title>
  
  <!-- Favicon -->
  <link rel="shortcut icon" href="{% static 'favicon.ico' %}" type="image/x-icon">
  
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- MDB -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.2.0/mdb.min.css" rel="stylesheet" />
  
  <!-- SweetAlert2 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.6.0/dist/sweetalert2.min.css">
  
  <style>
    :root {
      --primary-color: #3a86ff;
      --secondary-color: #1a5276;
      --accent-color: #e74c3c;
      --light-color: #f8f9fa;
      --dark-color: #2c3e50;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
    }
    
    .auth-card {
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      border: none;
    }
    
    .auth-header {
      background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
      color: white;
      padding: 2rem;
      text-align: center;
    }
    
    .auth-title {
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    
    .auth-image {
      max-height: 400px;
      object-fit: contain;
    }
    
    .form-outline .form-control:focus ~ .form-label {
      color: var(--primary-color);
    }
    
    .form-outline .form-control:focus ~ .form-notch .form-notch-leading,
    .form-outline .form-control:focus ~ .form-notch .form-notch-middle,
    .form-outline .form-control:focus ~ .form-notch .form-notch-trailing {
      border-color: var(--primary-color) !important;
      box-shadow: none;
    }
    
    .btn-auth {
      background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
      border: none;
      padding: 12px 30px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.3s;
    }
    
    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(58, 134, 255, 0.3);
    }
    
    .back-to-login {
      color: var(--secondary-color);
      text-decoration: none;
      transition: color 0.3s;
    }
    
    .back-to-login:hover {
      color: var(--primary-color);
      text-decoration: underline;
    }
    
    @media (max-width: 992px) {
      .auth-image-container {
        order: -1;
        padding-bottom: 2rem;
      }
    }
  </style>
</head>

<body>
  <section class="vh-100 d-flex align-items-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="card auth-card">
            <div class="row g-0">
              <div class="col-lg-6 d-flex flex-column">
                <div class="auth-header">
                  <h2 class="auth-title mb-3">
                    <i class="fas fa-lock me-2"></i> Réinitialisation du mot de passe
                  </h2>
                  <p class="mb-0">Entrez votre email pour recevoir un lien de réinitialisation</p>
                </div>
                
                <div class="card-body p-5">
                  {% if messages %}
                    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
                    <script>
                      document.addEventListener('DOMContentLoaded', function() {
                        {% for message in messages %}
                        Swal.fire({
                          position: 'top-end',
                          icon: '{% if "error" in message.tags %}error{% elif "success" in message.tags %}success{% else %}info{% endif %}',
                          title: '{{ message }}',
                          showConfirmButton: false,
                          timer: 3000,
                          backdrop: false,
                          width: '400px'
                        });
                        {% endfor %}
                      });
                    </script>
                  {% endif %}

                  <form method="POST" action="">
                    {% csrf_token %}
                    
                    <div class="mb-4 form-outline">
                      <input type="email" id="email" name="email" class="form-control form-control-lg" required />
                      <label class="form-label" for="email">Adresse email</label>
                      <div class="form-notch">
                        <div class="form-notch-leading" style="width: 9px;"></div>
                        <div class="form-notch-middle" style="width: 88.8px;"></div>
                        <div class="form-notch-trailing"></div>
                      </div>
                    </div>

                    <div class="d-grid mb-4">
                      <button type="submit" class="btn btn-primary btn-auth btn-lg">
                        <i class="fas fa-paper-plane me-2"></i> Envoyer le lien
                      </button>
                    </div>
                    
                    <div class="text-center pt-3">
                      <a href="{% url 'user_login' %}" class="back-to-login">
                        <i class="fas fa-arrow-left me-2"></i> Retour à la connexion
                      </a>
                    </div>
                  </form>
                </div>
              </div>
              
              <div class="col-lg-6 auth-image-container d-flex align-items-center justify-content-center p-5">
                <img src="{% static 'logo.jpg' %}" class="auth-image w-100" alt="Réinitialisation de mot de passe" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- MDB JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.2.0/mdb.min.js"></script>
  
  <!-- SweetAlert2 JS -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
