{% load static %}
<aside class="main-sidebar">
  <section class="sidebar">
    <!-- Panneau utilisateur -->
    <div class="user-panel">
      <div class="pull-left image">
        {% if image %}
            <img src="{{ image }}" alt="Admin" class="rounded-circle" width="150">
        {% else %}
            <img src="{% static 'img/photo-indisponible.webp' %}" alt="Admin par défaut" class="rounded-circle" width="150">
        {% endif %}
      </div>

      <div class="pull-left info">
        <p>{{ nom_complet }}</p>
        <a href="#"><i class="fa fa-circle text-success"></i> En Ligne</a>
      </div>
    </div>

    <!-- Menu -->
    <ul class="sidebar-menu">
      <li class="header">MENU ADMINISTRATEUR</li>

      <li class="{% if request.resolver_match.url_name == 'administrateur_page' %}active{% endif %}">
        <a href="{% url 'administrateur_page' %}">
          <i class="fa fa-dashboard"></i> <span>Accueil</span>
        </a>
      </li>

      <li class="{% if request.resolver_match.url_name == 'gerer_inscription_admin' %}active{% endif %}">
        <a href="{% url 'gerer_inscription_admin' %}">
          <i class="fa fa-university"></i> <span>Inscriptions Structures</span>
        </a>
      </li>


      <li class="{% if request.resolver_match.url_name == 'listeDemandeCarte_admin' %}active{% endif %}">
        <a href="{% url 'listeDemandeCarte_admin' %}">
          <i class="fa fa-id-card"></i> <span>Liste Demandes de Carte</span>
        </a>
      </li>
      <li class="{% if request.resolver_match.url_name == 'notification_admin' %}active{% endif %}">
        <a href="{% url 'notification_admin' %}">
          <i class="fa fa-bell"></i> <span>Notification</span>
        </a>
      </li>

      <li class="{% if request.resolver_match.url_name == 'profil_admin_page' %}active{% endif %}">
        <a href="{% url 'profil_admin_page' %}">
          <i class="fa fa-user-circle"></i> <span>Profil</span>
        </a>
      </li>

      <li>
        <a href="javascript:void(0);" onclick="confirmLogout()">
            <i class="fa fa-sign-out"></i> <span>Déconnexion</span>
        </a>
      </li>    
    </ul>
  </section>
</aside>
