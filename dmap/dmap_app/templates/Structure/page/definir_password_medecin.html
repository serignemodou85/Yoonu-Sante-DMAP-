<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Font Awesome -->
    <link
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
        rel="stylesheet"
    />
    <!-- MDB -->
    <link
        href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/5.0.0/mdb.min.css"
        rel="stylesheet"
    />
    <title>Définir mot de passe</title>
</head>
<body>
<section class="vh-100" style="background-color: #eee">
    <div class="container h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
            <div class="col-lg-12 col-xl-11">

                <div class="card text-black" style="border-radius: 25px">
                    <a href="{% url 'user_login' %}" class="btn btn-primary mt-3">
                        Retour à la page de connexion
                    </a>
                    <div class="card-body p-md-5">
                        <div class="row justify-content-center">
                            <div class="col-md-10 col-lg-6 col-xl-5 order-2 order-lg-1">
                                <p class="text-center h1 fw-bold mb-5 mx-1 mx-md-4 mt-4">
                                    Définir votre mot de passe
                                </p>
                                {% if message %}
                                    {% if success %}
                                        <div class="alert alert-success alert-dismissible fade show" role="alert">
                                    {% else %}
                                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                    {% endif %}
                                            {{ message }}
                                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                        </div>
                                {% endif %}

                                <form method="POST" action="{% url 'definir_password_medecin' token=token %}">
                                    {% csrf_token %}

                                    <div class="d-flex flex-row align-items-center mb-4">
                                        <i class="fas fa-lock fa-lg me-3 fa-fw"></i>
                                        <div class="form-outline flex-fill mb-0">
                                            <input
                                                type="password"
                                                id="password"
                                                name="password"
                                                class="form-control"
                                                required
                                            />
                                            <label class="form-label" for="password">Nouveau mot de passe</label>
                                        </div>
                                    </div>

                                    <div class="d-flex flex-row align-items-center mb-4">
                                        <i class="fas fa-lock fa-lg me-3 fa-fw"></i>
                                        <div class="form-outline flex-fill mb-0">
                                            <input
                                                type="password"
                                                id="confirm_password"
                                                name="confirm_password"
                                                class="form-control"
                                                required
                                            />
                                            <label class="form-label" for="confirm_password">Confirmez le mot de passe</label>
                                        </div>
                                    </div>

                                    <div class="d-flex justify-content-center mx-4 mb-3 mb-lg-4">
                                        <button
                                            type="submit"
                                            class="btn btn-primary btn-lg"
                                        >
                                            Enregistrer
                                        </button>
                                    </div>
                                </form>
                            </div>
                            <div
                                class="col-md-10 col-lg-6 col-xl-7 d-flex align-items-center order-1 order-lg-2"
                            >
                                <img
                                    src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/draw1.webp"
                                    class="img-fluid"
                                    alt="Image illustrative"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- MDB -->
<script
    type="text/javascript"
    src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/5.0.0/mdb.min.js"
></script>

{% if message %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    Swal.fire({
        icon: '{% if success %}success{% else %}error{% endif %}',
        title: '{% if success %}Succès{% else %}Erreur{% endif %}',
        text: '{{ message }}',
        timer: 3000,
        showConfirmButton: false
    });
</script>
{% endif %}
</body>
</html>
